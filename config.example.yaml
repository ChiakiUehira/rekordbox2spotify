rekordbox:
  source: xml
  xml_path: ~/Documents/rekordbox.xml
  db_path: ~/Library/Pioneer/rekordbox/master.db
  # Exact-match playlist names to exclude from verify report.
  # Useful for skipping rekordbox-internal playlists like CUE analysis or Spotify trial residue.
  ignore_playlists:
    - "Trial playlist - Cloud Library Sync"
    - "CUE解析用プレイリスト"

output:
  log_dir: ./logs
